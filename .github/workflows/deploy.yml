name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

jobs:
  deploy:
    name: Deploy to ${{ env.DEPLOY_ENV }}
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENV }}
    concurrency:
      group: deploy-${{ env.DEPLOY_ENV }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy android-app
        run: echo "Deploying android-app to ${{ env.DEPLOY_ENV }}"

      - name: Notify Cortex
        run: |
          curl -s -X POST https://api.getcortexapp.com/api/v1/catalog/android-app/deploys \
            -H "Authorization: Bearer ${{ secrets.CORTEX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"environment":"${{ env.DEPLOY_ENV }}","sha":"${{ github.sha }}","deployer":"${{ github.actor }}"}'

      - name: Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text":":red_circle: *android-app* deploy to *${{ env.DEPLOY_ENV }}* failed"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
